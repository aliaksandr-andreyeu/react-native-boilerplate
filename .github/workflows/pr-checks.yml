name: PR Checks

on:
  pull_request:
    branches:
      - development
      - main

jobs:
  lint:
    name: 🔍 Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Format
        run: npm run format

      - name: Run Lint
        run: npm run lint
